apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: upgrade-chart-name-change
spec:
  interval: 30s
  chart:
    spec:
      chart: config/testdata/charts/upgrade-chart-name-change/podinfo-renamed
      version: '>=6.0.0 <7.0.0'
      sourceRef:
        kind: GitRepository
        name: this
        namespace: default
      interval: 10m
  upgrade:
    chartNameChangeStrategy: Reinstall 
  values:
    resources:
      requests:
        cpu: 100m
        memory: 64Mi
